      <style>
        * {
          margin: 0;
          padding: 0;
          font-family: 'Consolas', monospace;
          box-sizing: border-box;
        }

        svg {
          font-size: 48px;
        }

        .terminal {
          display: flex;
          flex-direction: column;
          width: 100%;
          height: 100%;
          background-image: linear-gradient(
            90deg,
            #010711 0%,
            #020d1d 30%,
            #020d1d 70%,
            #010711 100%
          );
          border-radius: 0.625rem;
          border: 0.0625rem solid #30363d;
          box-shadow: 0 0.625rem 2.5rem #010a18c9;
          overflow: hidden;
        }

        .terminal-header {
          background-image: linear-gradient(
            90deg,
            #0c1a30 0%,
            #152236 30%,
            #152236 70%,
            #0c1a30 100%
          );
          display: flex;
          align-items: center;
          padding: 1rem 1.25rem;
          border-bottom: 0.0625rem solid #30363d;
          position: relative;
        }

        .window-controls {
          display: flex;
          gap: 0.5rem;
        }

        .control {
          width: 0.75rem;
          height: 0.75rem;
          border-radius: 50%;
        }

        .control.close { background: #ff5f56; }
        .control.minimize { background: #ffbd2e; }
        .control.maximize { background: #27ca3f; }

        .terminal-title {
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
          color: #8b949e;
          font-size: 0.875rem;
          font-weight: 500;
        }

        .terminal-body {
          flex-grow: 1;
          padding: 1.25rem;
          display: flex;
          align-items: center;
        }

        .terminal-content {
          width: 100%;
        }

        .terminal-line {
          display: flex;
          align-items: center;
          margin-bottom: 0.625rem;
        }

        .command-line {
          margin-bottom: 1.6rem;
        }

        .terminal-prompt {
          display: flex;
          font-size: 1.3rem;
        }

        .terminal-prompt__host { color: #008236; }
        .terminal-prompt__colon { color: #d4d4d4; }
        .terminal-prompt__path { color: #1447e6; }
        .terminal-prompt__dollar {
          color: #d4d4d4;
          margin-right: 0.625rem;
        }

        .terminal-command {
          display: flex;
          align-items: center;
          color: #d4d4d4;
          font-size: 1.3rem;
        }

        .terminal-command__char {
          display: block;
          width: 0;
          overflow: hidden;
          animation-name: appear;
          animation-duration: 0s;
          animation-fill-mode: forwards;
        }

        .terminal-command.whoami .terminal-command__char {
          animation-delay: calc(1.25s + var(--char-index, 0) * 0.07s);
        }

        .terminal-cursor {
          display: block;
          color: #d4d4d4;
          font-size: 1.5rem;
          opacity: 0;
          animation-name: blink;
          animation-duration: 0.75s;
          animation-fill-mode: infinite;
          animation-iteration-count: 3;
          animation-delay: 0s;
        }

        .name-output {
          margin: 0.7rem 0 1.75rem;
          text-align: center;
          font-size: 2.45rem;
          line-height: 1.08;
          font-weight: 900;
          letter-spacing: 0.02em;
          transform: translateY(1.25rem);
          opacity: 0;
          background-image: linear-gradient(
            135deg,
            #38bdf8,
            #a855f7,
            #f472b6,
            #22c55e,
            #38bdf8
          );
          background-size: 400% auto;
          background-clip: text;
          -webkit-background-clip: text;
          color: transparent;
          -webkit-text-fill-color: transparent;
          animation-name: fade-up, gradient;
          animation-duration: 1s, 30s;
          animation-fill-mode: forwards, none;
          animation-timing-function: ease-out, linear;
          animation-delay: 2.5s, 0s;
          animation-iteration-count: 1, infinite;
          white-space: nowrap;
        }

        .subtitle-line {
          justify-content: center;
          margin-top: 0.55rem;
          margin-bottom: 0;
        }

        .terminal-command.description {
          color: #ecc61b;
          font-size: 0.68rem;
          letter-spacing: -0.06em;
          justify-content: center;
          max-width: 100%;
          flex-wrap: nowrap;
        }

        .terminal-command.description .terminal-command__char {
          color: #ecc61b;
          white-space: pre;
          animation-delay: calc(4s + var(--char-index, 0) * 0.07s);
        }

        @keyframes appear {
          0% { width: auto; }
          100% { width: auto; }
        }

        @keyframes blink {
          0%, 50% { opacity: 1; }
          51%, 100% { opacity: 0; }
        }

        @keyframes fade-up {
          0% {
            opacity: 0;
            transform: translateY(1.25rem);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes gradient {
          0%, 100% { background-position: 0% center; }
          50% { background-position: 400% center; }
        }
      </style>
    </div>
  </foreignObject>
</svg>